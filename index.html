<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OREN | Next Gen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;800&display=swap');

        :root {
            --primary: #0984e3;
            --dark: #2d3436;
            --bg: #f7f9fc;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --radius: 20px;
        }

        * { box-sizing: border-box; font-family: 'Noto Kufi Arabic', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--dark); 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            min-height: 100vh;
        }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; background: var(--white);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000;
        }
        .logo-anim { font-size: 50px; font-weight: 800; color: var(--primary); letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* Global Container */
        .app-container { width: 100%; max-width: 450px; position: relative; }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }

        /* Inputs */
        .input-group { margin-bottom: 15px; position: relative; }
        input, select, textarea {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1.5px solid #eee; background: #fafafa;
            font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--primary); background: #fff; }

        /* Buttons */
        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary); color: white; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: #dfe6e9; color: var(--dark); margin-top: 10px; }

        /* Agent Header */
        .agent-header {
            background: var(--primary); color: white;
            padding: 25px; border-radius: var(--radius);
            margin-bottom: 25px; position: relative; overflow: hidden;
        }
        .agent-header h2 { margin: 0; font-size: 20px; z-index: 2; position: relative; }
        .agent-header i { position: absolute; right: -10px; bottom: -10px; font-size: 80px; opacity: 0.1; }

        /* Task Card */
        .task-card {
            background: white; padding: 20px; border-radius: 15px;
            margin-bottom: 15px; border-right: 5px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .task-card h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 18px; }
        .info-row { font-size: 13px; color: #636e72; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        
        .hidden { display: none !important; }
        .whatsapp-btn {
            position: fixed; bottom: 30px; left: 30px; 
            width: 55px; height: 55px; background: #25d366;
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 25px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            text-decoration: none; z-index: 100;
        }

        .status-badge {
            display: inline-block; padding: 4px 12px; background: #e1f5fe;
            color: #0288d1; border-radius: 8px; font-size: 11px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim">OREN</div>
        <p style="color: #b2bec3;">Loading Excellence...</p>
    </div>

    <div class="app-container">
        
        <div id="loginUI" class="card">
            <div style="text-align:center; margin-bottom:30px;">
                <h1 style="color: var(--primary); margin:0;">Welcome</h1>
                <p style="color:#636e72; font-size:14px;">سجل دخولك لمتابعة عملك</p>
            </div>
            <div class="input-group"><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
            <div class="input-group"><input type="password" id="pass" placeholder="كلمة المرور"></div>
            <button class="btn" onclick="login()">دخول <i class="fas fa-arrow-left"></i></button>
        </div>

        <div id="adminUI" class="hidden">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="margin:0;">تكليف مهمة</h2>
                    <span class="status-badge">ADMIN</span>
                </div>
                <div class="input-group"><input type="text" id="cName" placeholder="اسم العميل"></div>
                <div class="input-group"><input type="tel" id="cPhone" placeholder="رقم الهاتف"></div>
                <div class="input-group"><input type="text" id="cAddr" placeholder="العنوان"></div>
                <div class="input-group"><select id="agentSelect"><option value="">اختر المندوب</option></select></div>
                <div class="input-group"><textarea id="cIssue" rows="3" placeholder="وصف المهمة"></textarea></div>
                <button class="btn" onclick="assign()">إرسال للمندوب <i class="fas fa-paper-plane"></i></button>
                
                <button class="btn btn-secondary" onclick="showDashboard()">لوحة البيانات <i class="fas fa-chart-pie"></i></button>
                <button class="btn btn-secondary" style="color:#d63031" onclick="logout()">خروج</button>
            </div>
        </div>

        <div id="agentUI" class="hidden">
            <div class="agent-header">
                <i class="fas fa-rocket"></i>
                <p style="margin:0; opacity:0.8; font-size:12px;">مرحباً بك،</p>
                <h2 id="welcomeMsg">الفني</h2>
            </div>
            <div id="tasksContainer"></div>
            <button class="btn btn-secondary" onclick="logout()">تسجيل خروج</button>
        </div>

        <div id="dashboardUI" class="hidden">
            <div class="card">
                <h2>تحليل الأداء</h2>
                <div id="performanceList"></div>
                <button class="btn btn-secondary" onclick="showAdmin()">رجوع</button>
            </div>
        </div>

    </div>

    <a href="https://wa.me/201019564616" class="whatsapp-btn hidden" id="waBtn"><i class="fab fa-whatsapp"></i></a>

    <script>
        // سأبقي على نفس الـ Config والـ Logic الخاص بك لأنه شغال تمام
        const firebaseConfig = {
            apiKey: "AIzaSyALgV2v3lmxvEoP0HosqGSqm727vZrYUq4",
            authDomain: "orenapp-f2f1e.firebaseapp.com",
            databaseURL: "https://orenapp-f2f1e-default-rtdb.firebaseio.com",
            projectId: "orenapp-f2f1e",
            storageBucket: "orenapp-f2f1e.firebasestorage.app",
            messagingSenderId: "973368909449",
            appId: "1:973368909449:web:ce364a309f622f575c3058"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);

        function login() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert("بيانات الدخول غير صحيحة"));
        }

        firebase.auth().onAuthStateChanged(user => {
            const ui = ['loginUI', 'adminUI', 'agentUI', 'dashboardUI', 'waBtn'];
            ui.forEach(id => document.getElementById(id).classList.add('hidden'));
            if (user) {
                if (user.email === "admin@oren.com") {
                    document.getElementById('adminUI').classList.remove('hidden'); 
                    loadAgents();
                } else {
                    document.getElementById('agentUI').classList.remove('hidden');
                    document.getElementById('waBtn').classList.remove('hidden');
                    const n = user.email.split('@')[0];
                    document.getElementById('welcomeMsg').innerText = n;
                    db.ref('active_list/' + n).set({name: n});
                    loadTasks(n);
                }
            } else { document.getElementById('loginUI').classList.remove('hidden'); }
        });

        function loadAgents() {
            db.ref('active_list').on('value', snap => {
                const s = document.getElementById('agentSelect');
                s.innerHTML = '<option value="">-- اختر المندوب --</option>';
                snap.forEach(child => {
                    const n = child.key;
                    s.innerHTML += `<option value="${n}">${n}</option>`;
                });
            });
        }

        function assign() {
            const ag = document.getElementById('agentSelect').value;
            if(!ag) return alert("اختر المندوب");
            db.ref('modern_tasks').push({
                c: document.getElementById('cName').value,
                p: document.getElementById('cPhone').value,
                a: document.getElementById('cAddr').value,
                i: document.getElementById('cIssue').value,
                to: ag,
                timestamp: Date.now()
            }).then(() => { 
                alert("تم إرسال المهمة بنجاح ✅");
                document.getElementById('cName').value = ""; 
            });
        }

        function loadTasks(name) {
            db.ref('modern_tasks').on('value', snap => {
                const container = document.getElementById('tasksContainer'); 
                container.innerHTML = "";
                snap.forEach(c => {
                    const t = c.val();
                    if(t.to === name) {
                        container.innerHTML += `
                            <div class="task-card">
                                <h3>${t.c}</h3>
                                <div class="info-row"><i class="fas fa-phone"></i> ${t.p}</div>
                                <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${t.a}</div>
                                <div style="margin:15px 0; padding:10px; background:#f9f9f9; border-radius:8px; font-size:13px;">
                                    ${t.i}
                                </div>
                                <div class="input-group">
                                    <input type="text" id="note_${c.key}" placeholder="اكتب تقريرك هنا...">
                                </div>
                                <button class="btn" style="background:#00b894; padding:10px;" onclick="finishTask('${c.key}')">
                                    إتمام المهمة <i class="fas fa-check"></i>
                                </button>
                                <a href="tel:${t.p}" class="btn btn-secondary" style="padding:10px;">اتصال</a>
                            </div>`;
                    }
                });
            });
        }

        function finishTask(id) {
            const note = document.getElementById('note_' + id).value;
            if(!note) return alert("يجب كتابة التقرير");
            db.ref('modern_tasks/' + id).once('value', snap => {
                const data = snap.val();
                data.agentNote = note;
                db.ref('completed_tasks').push(data).then(() => {
                    db.ref('modern_tasks/' + id).remove();
                });
            });
        }

        function showDashboard() { document.getElementById('adminUI').classList.add('hidden'); document.getElementById('dashboardUI').classList.remove('hidden'); loadAnalytics(); }
        function showAdmin() { document.getElementById('dashboardUI').classList.add('hidden'); document.getElementById('adminUI').classList.remove('hidden'); }
        function logout() { firebase.auth().signOut(); }
        
        function loadAnalytics() {
            db.ref('completed_tasks').on('value', snap => {
                const list = document.getElementById('performanceList'); list.innerHTML = "";
                let stats = {};
                snap.forEach(c => {
                    let name = c.val().to;
                    stats[name] = (stats[name] || 0) + 1;
                });
                for(let n in stats) {
                    list.innerHTML += `<div class="info-row" style="justify-content:space-between; background:#f1f2f6; padding:10px; border-radius:10px; margin-bottom:5px;">
                        <span>${n}</span> <b>${stats[n]} مهمة</b>
                    </div>`;
                }
            });
        }
    </script>
</body>
</html>
